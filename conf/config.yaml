# =============================================================================
# NBA Playoff Predictor — Central Configuration
# =============================================================================

# ── Season range ─────────────────────────────────────────────────────────────
seasons:
  start: 1984          # Modern 16-team bracket era begins — fetch range
  model_start: 2003    # Training dataset start — 2003+ is all best-of-7; tune without re-fetching
  end: 2026            # Last completed regular season
  current: 2026        # Current season for prediction target
  aberrant:            # Seasons with unusual circumstances — add season_flag feature
    - 2012             # Lockout — 66-game season
    - 2020             # Bubble season — no true home court advantage

# ── Era definitions ──────────────────────────────────────────────────────────
# Justified in notebook 05_era_normalization.ipynb by visualizing pace,
# ORtg, and 3PA rate trends with breakpoint annotations.
eras:
  showtime:   {start: 1984, end: 1994, label: "Showtime/Physical"}
  defensive:  {start: 1995, end: 2004, label: "Defensive Era"}
  transition: {start: 2005, end: 2014, label: "Transition Era"}
  analytics:  {start: 2015, end: 9999, label: "Analytics/3-and-D Era"}

# ── Paths ────────────────────────────────────────────────────────────────────
paths:
  raw:
    bball_ref:
      team_stats:     data/raw/bball_ref/team_stats/
      player_stats:   data/raw/bball_ref/player_stats/
      playoff_series: data/raw/bball_ref/playoff_series/
    nba_api:
      team_game_logs:    data/raw/nba_api/team_game_logs/
      player_game_logs:  data/raw/nba_api/player_game_logs/
      injury_reports:    data/raw/nba_api/injury_reports/
    kaggle:
      supplemental: data/raw/kaggle/supplemental/
  processed:
    team_features:   data/processed/team_season_features.parquet
    player_features: data/processed/player_season_features.parquet
    series_dataset:  data/processed/series_dataset.parquet
    injury:          data/processed/injury_adjusted.parquet
    era_normalized:  data/processed/era_normalized.parquet
    checksums:       data/processed/checksums.txt
  predictions:
    input_2026:  data/predictions/2026/bracket_input.csv
    output_2026: data/predictions/2026/bracket_output.csv
  models:
    trained:    models/trained/
    calibrated: models/calibrated/
  reports:
    figures: reports/figures/

# ── Scraping settings ────────────────────────────────────────────────────────
scraping:
  bball_ref:
    base_url: "https://www.basketball-reference.com"
    rate_limit_seconds: 5.0         # seconds between requests
    cache_backend: "sqlite"
    cache_name: "data/raw/bball_ref/http_cache"
    max_retries: 3
    retry_backoff_seconds: 30
  nba_api:
    rate_limit_seconds: 0.65
    max_retries: 3
    headers:
      Host: "stats.nba.com"
      User-Agent: "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36"
      Accept: "application/json, text/plain, */*"
      Referer: "https://www.nba.com/"
      x-nba-stats-origin: "stats"
      x-nba-stats-token: "true"

