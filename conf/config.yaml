# ── Feature lists ────────────────────────────────────────────────────────────
features:
  team_season:
    - ORtg_norm
    - DRtg_norm
    - NRtg_norm
    - Pace_norm
    - eFG_pct
    - TS_pct
    - TOV_pct
    - ORB_pct
    - DRB_pct
    - FT_rate
    - opp_eFG_pct
    - opp_TOV_pct
    - opp_FT_rate
    - "3PA_rate"
    - "3P_pct"
    - SRS
    - MOV
    - Win_pct
    - Playoff_experience_years
    - Prior_playoff_win_pct
    - Coach_playoff_experience

  momentum:
    - L10_NRtg
    - L20_NRtg
    - L10_Win_pct
    - L20_Win_pct
    - L10_NRtg_delta
    - L20_NRtg_delta
    - L10_eFG_pct_delta
    - L10_DRtg_delta
    - current_win_streak
    - L10_home_win_pct
    - L10_away_win_pct

  player_season:
    - team_VORP_sum
    - team_BPM_weighted_avg
    - team_WS48_weighted_avg
    - Top3_VORP_sum
    - Star_player_BPM
    - Has_AllNBA_player
    - Top8_WS48_avg
    - Guard_VORP
    - Forward_VORP
    - Center_VORP

  player_momentum:
    - Star_PTS_L10_delta
    - Star_TS_pct_L10_delta
    - Top5_PTS_L10_delta_avg
    - Top5_MP_L10_avg
    - Star_GP_L10
    - Top5_GP_L10_avg

  injury:
    - adj_VORP_sum
    - Star_injured
    - Second_star_injured
    - Top2_Scorer_availability_avg
    - Lost_top_scorer
    - Lost_top2_scorers
    - Scoring_VORP_available_pct
    - Top_Rebounder_available
    - Lost_top_rebounder
    - Rebounding_capacity_pct
    - Top_Playmaker_available
    - Lost_top_playmaker
    - Top_Defender_available
    - Roster_VORP_available_pct
    - Injured_player_count
    - has_injury_data

  matchup:
    - delta_NRtg
    - delta_BPM
    - delta_VORP
    - delta_adj_VORP
    - delta_eFG_pct
    - delta_DRtg
    - delta_Pace
    - delta_Experience
    - delta_Prior_playoff_win_pct
    - delta_Prior_deepest_round
    - delta_Recent_appearances
    - higher_seed_Prior_champion_3yr
    - lower_seed_Prior_champion_3yr
    - delta_L10_NRtg
    - delta_Star_BPM
    - seed_diff
    - home_court_advantage
    - conference_East
    - conference_West
    - H2H_win_pct
    - H2H_NRtg_avg
    - H2H_games_played

  series_length:
    - Competitive_balance_index
    - Team_variance
    - Star_player_variance
    - Road_performance_gap

  meta:
    - era_showtime
    - era_defensive
    - era_transition
    - era_analytics
    - season_flag        # 1 for aberrant seasons (lockout, bubble)

# ── Modeling ─────────────────────────────────────────────────────────────────
modeling:
  random_state: 42
  min_train_seasons: 10   # minimum seasons before first CV test fold
  cv_n_splits: null        # null = use all available (walk-forward by season)

  injury_availability_thresholds:
    out: 0.0
    doubtful: 0.15
    questionable: 0.50
    probable: 0.85
    available: 1.0
    injured_threshold: 0.5   # below this = "lost" for binary flags

  player_tiers:
    allnba_bpm_threshold: 5.0    # BPM > 5.0 = All-NBA caliber
    star_bpm_threshold: 3.0      # BPM > 3.0 = star player
    rotation_top_n: 8            # top 8 by minutes = rotation depth

  momentum:
    last_n_games: [10, 20]       # compute L10 and L20 features

  calibration:
    method: isotonic             # isotonic or sigmoid (Platt)

  optuna:
    n_trials: 100
    timeout_seconds: 3600

  monte_carlo:
    n_simulations: 10000

# ── MLflow ────────────────────────────────────────────────────────────────────
mlflow:
  tracking_uri: mlruns/
  experiments:
    - series_winner_baseline
    - series_winner_xgboost
    - series_winner_lgbm
    - series_winner_ensemble
    - series_length_lgbm
    - series_length_ordinal
    - bracket_simulation_2026
  model_registry:
    winner_model_name: series_winner_champion
    length_model_name: series_length_champion
