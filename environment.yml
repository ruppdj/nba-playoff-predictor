name: nba-predictor
channels:
  - conda-forge
dependencies:
  - python=3.11
  - pandas=2.2
  - numpy=1.26
  - scikit-learn=1.4
  - matplotlib=3.8
  - seaborn=0.13
  - beautifulsoup4=4.12
  - lxml
  - requests=2.31
  - requests-cache=1.2
  - pyarrow=15
  - pyyaml=6.0
  - tqdm
  - jupyter
  - jupyterlab
  - nbconvert
  - scipy=1.12
  - statsmodels=0.14
  - pdfplumber
  - ruff
  - mypy
  - pre-commit
  - pytest=8.1
  - pytest-cov
  - pip
  - pip:
      # ML packages — installed via pip for reliable py311 builds
      - xgboost==2.0.3
      - lightgbm==4.3.0
      - mlflow==2.12.2
      - optuna==3.6.2
      - shap==0.45.0
      - plotly==5.20.0
      # Data validation
      - pandera==0.18.3
      # NBA-specific
      - nba_api==1.4.1
      # Ordinal regression
      - mord==0.7
      # Calibration
      - netcal==1.3.0
      # Kaggle (optional — credentials needed separately)
      - kaggle==1.6.14
